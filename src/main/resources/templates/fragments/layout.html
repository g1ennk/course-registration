<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">수강 신청</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:fragment="topbar" class="navbar navbar-expand bg-dark navbar-dark px-3 mb-3">
    <a class="navbar-brand" th:href="@{/web/courses}">수강신청</a>
    <div class="navbar-nav me-auto">
        <a class="nav-link" th:href="@{/web/courses}">강의 목록</a>
        <a class="nav-link" th:href="@{/web/enrollments/me}">내 신청</a>
        <a class="nav-link" th:href="@{/web/courses/new}">강의 등록</a>
    </div>
    <form class="d-flex align-items-center" th:action="@{/web/user}" method="post">
        <span class="navbar-text me-2">현재 사용자:
            <strong th:text="${currentUserId} ?: '미설정'">-</strong></span>
        <input class="form-control form-control-sm me-1" style="width:90px" type="number"
               name="userId" placeholder="userId" th:value="${currentUserId}">
        <button class="btn btn-sm btn-outline-light" type="submit">변경</button>
    </form>
</nav>

<div th:fragment="alerts">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
</div>

</body>
</html>
